<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#181825"/>
      <stop offset="100%" style="stop-color:#11111b"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4145a"/>
      <stop offset="100%" style="stop-color:#ec245c"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f05480"/>
      <stop offset="100%" style="stop-color:#d4145a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)" stroke="#1e1e2e" stroke-width="1"/>

  <!-- Top body (same size) -->
  <rect x="8" y="4" width="48" height="26" rx="5" ry="5" fill="url(#screen)" opacity="0.9"/>
  <!-- Top screen (large) -->
  <rect x="11" y="7" width="42" height="20" rx="2" ry="2" fill="#181825" opacity="0.5"/>

  <!-- Bottom body (same size) -->
  <rect x="8" y="34" width="48" height="26" rx="5" ry="5" fill="url(#screen)" opacity="0.9"/>
  <!-- Bottom screen (smaller) -->
  <rect x="16" y="39" width="32" height="16" rx="2" ry="2" fill="#181825" opacity="0.5"/>

  <!-- Top screen content indicators -->
  <rect x="16" y="12" width="4" height="4" rx="0.5" fill="url(#glow)" opacity="0.8"/>
  <rect x="24" y="12" width="4" height="4" rx="0.5" fill="#0066e6" opacity="0.7"/>
  <rect x="32" y="12" width="4" height="4" rx="0.5" fill="url(#glow)" opacity="0.6"/>
  <rect x="40" y="12" width="4" height="4" rx="0.5" fill="#0066e6" opacity="0.7"/>
  <rect x="16" y="19" width="4" height="4" rx="0.5" fill="#0066e6" opacity="0.7"/>
  <rect x="24" y="19" width="4" height="4" rx="0.5" fill="url(#glow)" opacity="0.8"/>
  <rect x="32" y="19" width="4" height="4" rx="0.5" fill="#0066e6" opacity="0.7"/>
  <rect x="40" y="19" width="4" height="4" rx="0.5" fill="url(#glow)" opacity="0.6"/>

  <!-- Bottom screen content indicators -->
  <rect x="22" y="43" width="4" height="4" rx="0.5" fill="url(#glow)" opacity="0.8"/>
  <rect x="30" y="43" width="4" height="4" rx="0.5" fill="#0066e6" opacity="0.7"/>
  <rect x="38" y="43" width="4" height="4" rx="0.5" fill="url(#glow)" opacity="0.6"/>
  <rect x="22" y="49" width="4" height="4" rx="0.5" fill="#0066e6" opacity="0.7"/>
  <rect x="30" y="49" width="4" height="4" rx="0.5" fill="url(#glow)" opacity="0.8"/>
</svg>
